name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout web-runtime
        uses: actions/checkout@v4
        with:
          repository: arfelious/ghoti-mlc-relax
          path: tvm_home/web
          ref: mlc
          submodules: 'recursive'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v11
        with:
          version: '3.1.45'

      - name: Build web-runtime
        run: |
          cd tvm_home/web
          make
          npm install
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Validate package contents
        run: npm pack --dry-run
